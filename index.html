<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Kankulator</title>
  </head>
  <body>
    <div class="calculator">
      <input type="text" id="display" class="qiymat" />

      <button onclick="bos('1')" class="btn">1</button>
      <button onclick="bos('2')" class="btn">2</button>
      <button onclick="bos('3')" class="btn">3</button>
      <button onclick="bos('4')" class="btn">4</button>
      <button onclick="bos('5')" class="btn">5</button>
      <button onclick="bos('6')" class="btn">6</button>
      <button onclick="bos('7')" class="btn">7</button>
      <button onclick="bos('8')" class="btn">8</button>
      <button onclick="bos('9')" class="btn">9</button>
      <button onclick="bos('0')" class="btn">0</button>

      <button onclick="bos('+')" class="btn">+</button>
      <button onclick="bos('-')" class="btn">-</button>
      <button onclick="bos('*')" class="btn">*</button>
      <button onclick="bos('/')" class="btn">/</button>

      <button onclick="hisoblash()" class="btn">=</button>
      <button onclick="tozalash()"class="btn">C</button>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
